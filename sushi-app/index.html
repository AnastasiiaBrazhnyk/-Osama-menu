<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Osama Sushi - Flashcards</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-green: rgba(0, 255, 128, 0.4);
            --accent-red: rgba(255, 0, 85, 0.4);
            --text-color: #e0e0e0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: background 0.3s;
        }

        /* ---------- Екран вибору категорії ---------- */
        #category-menu {
            width: 100%;
            max-width: 400px;
            height: 100%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 12px;
        }
        #category-menu h1 {
            color: #ff3366;
            font-size: 22px;
            margin-bottom: 10px;
            text-align: center;
        }
        .category-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: 1px solid #333;
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 16px;
            font-weight: bold;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .category-btn span.cnt {
            color: #888;
            font-weight: normal;
            font-size: 14px;
        }
        .category-btn.all {
            background: linear-gradient(135deg, #ff3366, #ff0055);
            border: none;
            color: white;
        }
        .category-btn.all span.cnt { color: rgba(255,255,255,0.8); }

        /* ---------- Екран карток ---------- */
        #study-screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #app-container { position: relative; width: 100%; max-width: 400px; height: 60vh; perspective: 1000px; }

        .card {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            cursor: grab;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: transparent;
        }
        .card.flipped { transform: rotateY(180deg); }
        .card:active { cursor: grabbing; }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .card-front { font-size: 24px; font-weight: bold; text-transform: uppercase; color: #ff3366; text-shadow: 0 0 10px rgba(255,51,102,0.3); }
        .card-back { transform: rotateY(180deg); align-items: flex-start; justify-content: flex-start; overflow-y: auto; }
        .card-back h3 { color: #ff3366; margin-bottom: 15px; width: 100%; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px;}
        .ingredient { width: 100%; display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 16px; border-bottom: 1px dashed #333; }

        #controls { margin-top: 30px; display: flex; justify-content: space-between; width: 100%; max-width: 300px; }
        .btn { padding: 15px 30px; border-radius: 30px; border: none; font-weight: bold; font-size: 16px; color: white; cursor: pointer; }
        .btn-left { background-color: #ff0055; box-shadow: 0 0 15px rgba(255,0,85,0.4); }
        .btn-right { background-color: #00ff80; color: #000; box-shadow: 0 0 15px rgba(0,255,128,0.4); }

        #progress { position: absolute; top: 20px; font-size: 14px; color: #888; display: flex; gap: 14px; align-items: center; }
        #back-to-menu {
            background: none;
            border: 1px solid #444;
            color: #aaa;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Екран вибору категорії -->
    <div id="category-menu">
        <h1>Що вчимо сьогодні?</h1>
        <!-- Кнопки категорій генеруються в app.js -->
    </div>

    <!-- Екран флешкарток -->
    <div id="study-screen">
        <div id="progress">
            <button id="back-to-menu">← Категорії</button>
            <span>Залишилось: <span id="count">0</span></span>
        </div>
        <div id="app-container"></div>
        <div id="controls">
            <button class="btn btn-left">Не знаю</button>
            <button class="btn btn-right">Знаю</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log("Service Worker Registered"));
        }
    </script>
</body>
</html>
